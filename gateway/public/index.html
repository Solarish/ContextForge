<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContextForge Dashboard</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --surface:#111827; --text:#f8fafc; --muted:#cbd5e1; --line:#334155; --brand:#60a5fa; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    header, main { width:min(1100px, calc(100% - 28px)); margin:auto; }
    header { padding:28px 0 14px; }
    h1 { margin:0; font-size:clamp(1.5rem, 4vw, 2.5rem); }
    p { color:var(--muted); line-height:1.55; }
    .grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; margin:18px 0; }
    .card { border:1px solid var(--line); background:var(--surface); border-radius:8px; padding:16px; }
    button { background:var(--brand); color:#06111f; border:0; border-radius:8px; padding:9px 12px; font-weight:800; cursor:pointer; }
    pre { white-space:pre-wrap; overflow-wrap:anywhere; color:#dbeafe; }
    @media (max-width: 780px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>ContextForge</h1>
    <p>Local dashboard for canonical report, linked wiki, context gates, and agent-ready source bundles.</p>
    <button onclick="refresh()">Refresh index</button>
  </header>
  <main>
    <section class="grid">
      <div class="card"><h2>Status</h2><pre id="status">Loading...</pre></div>
      <div class="card"><h2>Context Gate</h2><pre id="bundle">Run refresh to load sources.</pre></div>
      <div class="card"><h2>Next</h2><p>Edit report, wiki, and context rules, then register MCP tools with your agent host.</p></div>
    </section>
  </main>
  <script>
    async function getJson(url, options) {
      const res = await fetch(url, options);
      return res.json();
    }
    async function load() {
      document.getElementById("status").textContent = JSON.stringify(await getJson("/api/status"), null, 2);
      document.getElementById("bundle").textContent = JSON.stringify(await getJson("/api/context/bundle", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ topic: "system overview", taskType: "architecture" })
      }), null, 2);
    }
    async function refresh() {
      await getJson("/api/index/refresh", { method: "POST" });
      await load();
    }
    load();
  </script>
</body>
</html>
